<html>
  <head>
    <title>Naive Bayes Prediction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>Smoker Prediction</h1>

      <input type="number" id="total_bill" placeholder="Total Bill" />
      <input type="number" id="tip" placeholder="Tip" />
      <input type="number" id="size" placeholder="Size" />

      <select id="sex">
        <option value="Female">Female</option>
        <option value="Male">Male</option>
      </select>

      <select id="day">
        <option value="Fri">Fri</option>
        <option value="Sat">Sat</option>
        <option value="Sun">Sun</option>
        <option value="Thur">Thur</option>
      </select>

      <select id="time">
        <option value="Dinner">Dinner</option>
        <option value="Lunch">Lunch</option>
      </select>

      <button onclick="predict()">Predict</button>

      <h2 id="result"></h2>
    </div>

    <script>
      async function predict() {
        const sex = document.getElementById("sex").value;
        const day = document.getElementById("day").value;
        const time = document.getElementById("time").value;

        const data = {
          total_bill: document.getElementById("total_bill").value,
          tip: document.getElementById("tip").value,
          size: document.getElementById("size").value,

          sex_Female: sex === "Female" ? 1 : 0,
          sex_Male: sex === "Male" ? 1 : 0,

          day_Fri: day === "Fri" ? 1 : 0,
          day_Sat: day === "Sat" ? 1 : 0,
          day_Sun: day === "Sun" ? 1 : 0,
          day_Thur: day === "Thur" ? 1 : 0,

          time_Dinner: time === "Dinner" ? 1 : 0,
          time_Lunch: time === "Lunch" ? 1 : 0,
        };

        const response = await fetch("/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(data),
        });

        const result = await response.json();

        document.getElementById("result").innerText =
          "Prediction: " + result.prediction;
      }
    </script>
  </body>
</html>
